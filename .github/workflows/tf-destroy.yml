name: Terraform Destroy

on:
  workflow_dispatch:
    inputs:
      env:
        description: "Environment directory under environments/ (e.g., dev)"
        required: true
        default: "dev"
      aws_region:
        description: "AWS region"
        required: true
        default: "us-east-1"
      ecr_repo_name:
        description: "ECR repository name (must match what was applied)"
        required: true
        default: "archymedes-app"
      s3_bucket_name:
        description: "S3 bucket name (must match what was applied)"
        required: true
      allowed_principal_arns:
        description: "JSON list of IAM principal ARNs (must match what was applied)"
        required: false
        default: "[]"
      confirm:
        description: 'Type "destroy" to confirm'
        required: true

permissions:
  id-token: write
  contents: read

jobs:
  destroy:
    if: ${{ github.event.inputs.confirm == 'destroy' }}
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.env }}
    defaults:
      run:
        working-directory: ./environments/${{ github.event.inputs.env }}

    env:
      TF_VAR_aws_region: ${{ github.event.inputs.aws_region }}
      TF_VAR_ecr_repo_name: ${{ github.event.inputs.ecr_repo_name }}
      TF_VAR_s3_bucket_name: ${{ github.event.inputs.s3_bucket_name }}
      TF_VAR_allowed_principal_arns: ${{ github.event.inputs.allowed_principal_arns }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ github.event.inputs.aws_region }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.10.5"
          terraform_wrapper: false

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.AWS_TF_STATE_BUCKET }}" \
            -backend-config="key=environments/${{ github.event.inputs.env }}/terraform.tfstate" \
            -backend-config="region=${{ github.event.inputs.aws_region }}"

      - name: Empty S3 bucket before destroy
        run: |
          set -euo pipefail
          BUCKET="${{ github.event.inputs.s3_bucket_name }}"
          echo "Purging s3://$BUCKET (object versions + delete markers)…"
          # Best-effort: if the bucket doesn't exist, skip.
          if aws s3api head-bucket --bucket "$BUCKET" 2>/dev/null; then
            aws s3api list-object-versions --bucket "$BUCKET" --output json \
              --query '{Objects: Versions[].{Key:Key,VersionId:VersionId}}' \
              > versions.json
            if [ "$(jq '.Objects | length // 0' versions.json)" -gt 0 ]; then
              aws s3api delete-objects --bucket "$BUCKET" --delete file://versions.json
            fi
            aws s3api list-object-versions --bucket "$BUCKET" --output json \
              --query '{Objects: DeleteMarkers[].{Key:Key,VersionId:VersionId}}' \
              > markers.json
            if [ "$(jq '.Objects | length // 0' markers.json)" -gt 0 ]; then
              aws s3api delete-objects --bucket "$BUCKET" --delete file://markers.json
            fi
          else
            echo "Bucket $BUCKET not found, skipping purge."
          fi

      - name: Terraform Destroy
        run: terraform destroy -input=false -auto-approve
